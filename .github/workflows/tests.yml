name: Test tiers

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"

permissions:
  contents: read

jobs:
  integration-and-regression:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: phoenix
          POSTGRES_USER: phoenix
          POSTGRES_PASSWORD: phoenix
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U phoenix -d phoenix"
          --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: pytest tests/integration tests/regression -m "integration or regression"

